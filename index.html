<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildGuard AI - Dashboard</title>
    <link rel="stylesheet" href="/static/lib/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/lib/leaflet/leaflet.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body class="dark-mode">
    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-overlay">
        <div class="splash-content">
            <img src="/static/images/wildguard-logo.svg" width="120">
            <div class="spinner-border text-success mt-3" role="status"></div>
            <p class="mt-2">Initializing WildGuard AI...</p>
        </div>
    </div>

    <!-- Notification Center -->
    <div id="notificationCenter" class="notification-center glass-card p-3">
        <h5>Notifications</h5>
        <div id="notifList"></div>
        <button class="btn btn-sm btn-outline-light mt-2" onclick="clearNotifications()">Clear</button>
    </div>

    <!-- Main Container -->
    <div class="container-fluid p-0" id="mainApp" style="display:none">
        <!-- Top Bar -->
        <nav class="navbar navbar-expand-lg glass-nav">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><img src="/static/images/wildguard-logo.svg" width="40"> WildGuard AI</a>
                <div class="d-flex align-items-center gap-3">
                    <span id="liveClock" class="text-light fw-bold"></span>
                    <span class="badge bg-success" id="connectionStatus">Online</span>
                    <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">🌓</button>
                </div>
            </div>
        </nav>

        <!-- Main Content with Tabs -->
        <div class="tab-content p-3" id="mainTabContent">
            <!-- Dashboard Tab -->
            <div class="tab-pane fade show active" id="dashboardTab" role="tabpanel">
                <div class="row g-3">
                    <!-- Live Camera -->
                    <div class="col-12 col-lg-8">
                        <div class="glass-card p-3 camera-panel">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5>📷 Live Camera Feed</h5>
                                <div>
                                    <button class="btn btn-sm btn-success" id="startCamBtn">Start Camera</button>
                                    <button class="btn btn-sm btn-danger" id="stopCamBtn" disabled>Stop</button>
                                    <button class="btn btn-sm btn-info" onclick="switchCamera()" title="Switch Camera">🔄</button>
                                    <button class="btn btn-sm btn-warning" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
                                    <button class="btn btn-sm btn-light" onclick="captureFrame()" title="Capture">📸</button>
                                </div>
                            </div>
                            <div class="video-container position-relative">
                                <video id="webcamVideo" autoplay playsinline muted class="w-100 rounded"></video>
                                <canvas id="detectionCanvas" class="position-absolute top-0 start-0 w-100 h-100"></canvas>
                                <div id="nightVisionOverlay" class="night-vision-overlay d-none"></div>
                            </div>
                            <div class="mt-2 d-flex gap-2">
                                <button class="btn btn-sm btn-outline-info" onclick="toggleNightVision()">🌙 Night Vision</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="toggleThermal()">🔥 Thermal Mode</button>
                            </div>
                        </div>
                    </div>

                    <!-- Device Status Cards -->
                    <div class="col-12 col-lg-4">
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="glass-card p-2 text-center">
                                    <small>🔋 Battery</small>
                                    <div class="progress mt-1" style="height: 8px;">
                                        <div class="progress-bar bg-success" id="batteryBar" style="width:85%"></div>
                                    </div>
                                    <small id="batteryText">85%</small>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="glass-card p-2 text-center">
                                    <small>☀️ Solar</small>
                                    <div id="solarAnim" class="solar-icon mt-1">⚡ Charging</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="glass-card p-2 text-center">
                                    <small>🌡️ Temp</small>
                                    <h5 id="tempDisplay">24.5°C</h5>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="glass-card p-2 text-center">
                                    <small>📶 Network</small>
                                    <h5 id="netStrength">4/5</h5>
                                </div>
                            </div>
                        </div>
                        <!-- Alert Feed -->
                        <div class="glass-card p-2 mt-3" id="alertFeed">
                            <h6>🚨 Recent Alerts</h6>
                            <div id="alertList" style="max-height:200px; overflow-y:auto;"></div>
                        </div>
                        <!-- SOS Button -->
                        <button class="btn btn-danger w-100 mt-2 py-3 sos-btn" onclick="triggerSOS()">
                            🆘 EMERGENCY SOS
                        </button>
                    </div>
                </div>
            </div>

            <!-- History Tab -->
            <div class="tab-pane fade" id="historyTab" role="tabpanel">
                <div class="glass-card p-3">
                    <div class="d-flex justify-content-between mb-2">
                        <h5>📋 Detection History</h5>
                        <div>
                            <button class="btn btn-sm btn-outline-light" onclick="exportLogs('json')">Export JSON</button>
                            <button class="btn btn-sm btn-outline-light" onclick="exportLogs('csv')">Export CSV</button>
                        </div>
                    </div>
                    <input class="form-control mb-2" type="text" id="searchHistory" placeholder="Search...">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover" id="historyTable">
                            <thead><tr><th>Animal</th><th>Confidence</th><th>Timestamp</th><th>Image</th><th>Action</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Analytics Tab -->
            <div class="tab-pane fade" id="analyticsTab" role="tabpanel">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="glass-card p-3"><h5>📊 Animal Frequency</h5><canvas id="animalChart"></canvas></div>
                    </div>
                    <div class="col-md-6">
                        <div class="glass-card p-3"><h5>📈 Daily Alerts</h5><canvas id="dailyChart"></canvas></div>
                    </div>
                </div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-pane fade" id="settingsTab" role="tabpanel">
                <div class="glass-card p-3">
                    <h5>⚙️ Settings</h5>
                    <div class="mb-2"><label>Alert Sensitivity</label><input type="range" class="form-range" id="sensitivity"></div>
                    <div class="mb-2"><label>Camera Quality</label>
                        <select class="form-select" id="cameraQuality">
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select></div>
                    <div class="mb-2"><label>Sound Volume</label><input type="range" class="form-range" id="volumeSlider"></div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="darkModeToggle" checked> <label>Dark Mode</label>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="notifToggle"> <label>Desktop Notifications</label>
                    </div>
                    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
                </div>
            </div>

            <!-- Map Section (always visible in a collapsible area) -->
            <div class="mt-3" id="mapSection">
                <div class="glass-card p-3">
                    <h5>📍 GPS Map (Simulated)</h5>
                    <div id="leafletMap" style="height:300px;"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="bottom-nav d-lg-none">
            <button class="nav-item active" data-tab="dashboardTab">🏠 Dashboard</button>
            <button class="nav-item" data-tab="historyTab">📋 History</button>
            <button class="nav-item" data-tab="analyticsTab">📊 Analytics</button>
            <button class="nav-item" data-tab="settingsTab">⚙️ Settings</button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="/static/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/lib/leaflet/leaflet.js"></script>
    <script src="/static/lib/chart.js/chart.umd.min.js"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/storage.js"></script>
    <script src="/static/js/camera.js"></script>
    <script src="/static/js/detection.js"></script>
    <script src="/static/js/alerts.js"></script>
    <script src="/static/js/nightvision.js"></script>
    <script src="/static/js/map.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/demo.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
