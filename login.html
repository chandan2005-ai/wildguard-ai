<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildGuard - Login</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/static/lib/bootstrap/css/bootstrap.min.css" onerror="this.href=''">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* fallback if Bootstrap missing */
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #111; color:#fff; }
        .login-box { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 1rem; text-align: center; max-width: 400px; width: 100%; }
        input, button { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.5rem; border: none; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container glass-card">
        <div class="text-center mb-4">
            <!-- Inline SVG logo as fallback -->
            <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#00e676" />
                <path d="M30 55 L50 35 L70 55" stroke="white" stroke-width="6" fill="none" />
                <circle cx="50" cy="65" r="8" fill="white" />
            </svg>
            <h2 class="mt-2 fw-bold">WildGuard AI</h2>
            <p class="text-muted">IoT Wildlife Monitoring System</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control form-control-lg" id="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control form-control-lg" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">🔐 Login</button>
        </form>
        <div class="text-center mt-3">
            <a href="/register" class="text-decoration-none">Create Account</a> |
            <a href="/forgot-password" class="text-decoration-none">Forgot Password?</a>
        </div>
        <div id="loginAlert" class="mt-3"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                document.getElementById('loginAlert').innerHTML = '<div class="alert alert-warning">Please fill all fields.</div>';
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('wildguard_user', data.user);
                    window.location.href = '/';
                } else {
                    document.getElementById('loginAlert').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                }
            } catch (err) {
                document.getElementById('loginAlert').innerHTML = '<div class="alert alert-danger">Network error. Is the server running?</div>';
            }
        });
    </script>
</body>
</html>
