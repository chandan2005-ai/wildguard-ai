<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WildGuard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/static/lib/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container glass-card">
        <div class="text-center mb-4">
            <svg width="80" height="80" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#00e676"/><path d="M30 55 L50 35 L70 55" stroke="white" stroke-width="6" fill="none"/><circle cx="50" cy="65" r="8" fill="white"/></svg>
            <h2 class="fw-bold">Create Account</h2>
        </div>
        <form id="regForm">
            <div class="mb-3"><label class="form-label">Username</label><input type="text" class="form-control form-control-lg" id="regUser" required></div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control form-control-lg" id="regPass" required></div>
            <button type="submit" class="btn btn-success w-100 btn-lg">Register</button>
        </form>
        <div class="text-center mt-3"><a href="/login">Already have an account?</a></div>
        <div id="regAlert" class="mt-3"></div>
    </div>
    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            if (!username || !password) {
                document.getElementById('regAlert').innerHTML = '<div class="alert alert-warning">Please fill all fields.</div>';
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('regAlert').innerHTML = '<div class="alert alert-success">Registered! <a href="/login">Login now</a></div>';
                } else {
                    document.getElementById('regAlert').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                }
            } catch (err) {
                document.getElementById('regAlert').innerHTML = '<div class="alert alert-danger">Server error. Try again.</div>';
            }
        });
    </script>
</body>
</html>
