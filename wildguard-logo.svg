<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a1a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
  </defs>

  <!-- Background circle (tech ring) -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="4" opacity="0.9"/>

  <!-- Radar arcs -->
  <path d="M 100 100 L 20 60 A 95 95 0 0 1 55 20" fill="none" stroke="#00e676" stroke-width="2" opacity="0.3" stroke-dasharray="4 4"/>
  <path d="M 100 100 L 180 60 A 95 95 0 0 0 145 20" fill="none" stroke="#00e676" stroke-width="2" opacity="0.2" stroke-dasharray="4 4"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#00e676" stroke-width="1" opacity="0.15"/>

  <!-- Central shield -->
  <path d="M 100 30 L 165 55 L 165 120 Q 165 160 100 175 Q 35 160 35 120 L 35 55 Z" fill="rgba(0,0,0,0.4)" stroke="url(#accentGrad)" stroke-width="3" stroke-linejoin="round"/>

  <!-- Paw print inside shield -->
  <!-- Main pad -->
  <ellipse cx="100" cy="105" rx="20" ry="17" fill="#00e676" transform="rotate(-10 100 105)"/>
  <!-- Toes -->
  <ellipse cx="75" cy="75" rx="7" ry="10" fill="#00e676" transform="rotate(-30 75 75)"/>
  <ellipse cx="95" cy="68" rx="7" ry="10" fill="#00e676" transform="rotate(-10 95 68)"/>
  <ellipse cx="115" cy="68" rx="7" ry="10" fill="#00e676" transform="rotate(10 115 68)"/>
  <ellipse cx="130" cy="80" rx="7" ry="10" fill="#00e676" transform="rotate(30 130 80)"/>

  <!-- Subtle Wi‑Fi waves above paw (IoT symbol) -->
  <path d="M 70 50 Q 100 35 130 50" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.8"/>
  <path d="M 80 42 Q 100 30 120 42" fill="none" stroke="#00e676" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="36" r="3" fill="#00e676" opacity="0.9"/>

  <!-- Text "WILDGUARD" -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#00e676" letter-spacing="3">WILDGUARD</text>
</svg>